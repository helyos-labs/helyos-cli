name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      # FIXED (not ignored): atty RUSTSEC-2021-0145/2024-0375 (std::io::IsTerminal),
      # serde_yml/libyml RUSTSEC-2025-0067/0068 (serde_yml -> serde_yaml_ng).
      # Remaining are unmaintained/unsound TRANSITIVE crates with no fix:
      #   RUSTSEC-2025-0119 — number_prefix unmaintained (via indicatif)
      #   RUSTSEC-2024-0436 — paste unmaintained (proc-macro, via ratatui)
      #   RUSTSEC-2026-0002 — lru unsound IterMut (via ratatui; no 0.12.x fix)
      - run: >
          cargo audit
          --ignore RUSTSEC-2025-0119
          --ignore RUSTSEC-2024-0436
          --ignore RUSTSEC-2026-0002

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - run: cargo llvm-cov --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
